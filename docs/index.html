<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Privacy Policy and Terms of Service for the Fruit Merge mobile game.">
  <title>Fruit Merge Legal</title>
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #fff8e8;
      color: #513622;
      font: 16px/1.6 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, calc(100% - 32px));
      padding: 40px;
      background: #fffce5;
      border: 3px solid #ffc77f;
      border-radius: 24px;
      box-shadow: 0 8px 0 rgb(168 75 0 / 12%);
      text-align: center;
    }
    h1 { margin: 0 0 8px; color: #a84b00; }
    p { margin: 0 0 28px; color: #7d654f; }
    nav { display: grid; gap: 14px; }
    a {
      display: block;
      padding: 14px 18px;
      border-radius: 14px;
      background: #06c968;
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }
    a:last-child { background: #349deb; }
    a:focus-visible { outline: 4px solid #513622; outline-offset: 3px; }
  </style>
</head>
<body>
  <main>
    <h1>Fruit Merge</h1>
    <p>Legal information for the Fruit Merge mobile game.</p>
    <nav aria-label="Legal documents">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </nav>
  </main>
</body>
</html>
